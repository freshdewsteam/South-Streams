name: Scrape & Update Cache

on:
  schedule:
    - cron: '0 19 * * *'
    - cron: '30 1 * * *'
    - cron: '0 7 * * *'
    - cron: '30 12 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper and save cache
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
          GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          # Ensure data directory exists
          mkdir -p data
          # Create empty cache files if they don't exist
          if [ ! -f data/movies-cache.json ]; then
            echo '{"_data": {}, "_seen": {}}' > data/movies-cache.json
          fi
          if [ ! -f data/series-cache.json ]; then
            echo '{"_data": {}}' > data/series-cache.json
          fi
          # Run the scraper
          node scripts/build-cache.js

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/movies-cache.json data/series-cache.json data/cache.json || echo "No cache files to add"
          if git diff --staged --quiet; then
            echo "📭 No changes to cache"
          else
            git commit -m "chore: update cache $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "Nothing to commit"
            git push || echo "Nothing to push"
          fi
