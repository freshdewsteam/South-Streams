name: Scrape & Update Cache

on:
  schedule:
    - cron: '0 19 * * *'
    - cron: '30 1 * * *'
    - cron: '0 7 * * *'
    - cron: '30 12 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci  # 'npm ci' is faster and more reliable than 'npm install'

      - name: Run scraper and save cache
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
        run: node scripts/build-cache.js

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "📭 No changes to cache"
          else
            git commit -m "chore: update OTT cache $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "✅ Cache updated and pushed"
          fi
