name: Scrape & Update Cache

on:
  schedule:
    - cron: '0 19 * * *'
    - cron: '30 1 * * *'
    - cron: '0 7 * * *'
    - cron: '30 12 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create data directory
        run: |
          mkdir -p data
          touch data/cache.json data/movies-cache.json data/series-cache.json
          echo '{}' > data/cache.json
          echo '{"_data": {}, "_seen": {}}' > data/movies-cache.json
          echo '{"_data": {}}' > data/series-cache.json

      - name: Run scraper and save cache
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
          GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          echo "🚀 Running scraper..."
          node scripts/build-cache.js

      - name: Check cache file exists
        run: |
          if [ -f data/cache.json ]; then
            echo "✅ data/cache.json exists"
            cat data/cache.json | head -20
          else
            echo "❌ data/cache.json does not exist!"
            exit 1
          fi

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add all cache files
          git add data/cache.json data/movies-cache.json data/series-cache.json || echo "No files to add"
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "📭 No changes to cache"
          else
            git commit -m "chore: update cache $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "✅ Cache updated and pushed"
          fi

      - name: Upload cache as artifact (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cache-files
          path: |
            data/cache.json
            data/movies-cache.json
            data/series-cache.json
          retention-days: 7
