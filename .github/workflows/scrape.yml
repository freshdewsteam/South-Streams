name: Scrape & Update Cache

on:
  schedule:
    - cron: '0 19 * * *'   # 12:30 AM IST
    - cron: '30 1 * * *'   #  7:00 AM IST
    - cron: '0 7 * * *'    # 12:30 PM IST
    - cron: '30 12 * * *'  #  6:00 PM IST
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper and save cache
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
        run: node scripts/build-cache.js

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to cache"
          else
            git commit -m "chore: update OTT cache $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
